<!DOCTYPE html>
<html>
<head>
<title>Tool Finder</title>
<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

input{
padding:10px;
width:300px;
border-radius:8px;
border:none;
margin:20px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
width:200px;
}

.card a{
display:block;
margin-top:10px;
background:#38bdf8;
color:black;
padding:8px;
border-radius:6px;
text-decoration:none;
}
</style>
</head>

<body>

<h1>Tool Finder</h1>

<input id="search" placeholder="Search tools...">

<div class="container" id="tools">

<div class="card">
<h3>ChatGPT</h3>
<p>AI chatbot</p>
<a href="https://chat.openai.com" target="_blank">Open</a>
</div>

<div class="card">
<h3>Canva</h3>
<p>Design tool</p>
<a href="https://canva.com" target="_blank">Open</a>
</div>

<div class="card">
<h3>CapCut</h3>
<p>Video editor</p>
<a href="https://capcut.com" target="_blank">Open</a>
</div>

</div>

<script>

let search=document.getElementById("search")

search.addEventListener("keyup",function(){

let value=search.value.toLowerCase()
let cards=document.querySelectorAll(".card")

cards.forEach(card=>{
card.style.display=
card.innerText.toLowerCase().includes(value)
? "block":"none"
})

})

</script>

</body>
</html>
